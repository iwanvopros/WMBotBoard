name: Tägliche WM-Tipps

# FALLBACK-Lauf (gratis). Mehrere Zeiten, weil GitHub geplante Jobs oft um Stunden verzögert
# oder auslässt – so kommt eher einer früh durch. predict.py überschreibt bereits angereicherte
# Tipps nicht; die primäre, verlässlichere Anreicherung macht die Claude-Routine um 09:05.
on:
  schedule:
    - cron: "35 7 * * *"   # 09:35 CEST – frühe Basis-Tipps
    - cron: "35 12 * * *"  # 14:35 CEST – Fallback NACH der 14:00-Claude-Routine
  workflow_dispatch:
    inputs:
      date:
        description: "Datum YYYY-MM-DD (leer = heute, Europe/Zurich)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: daily-tips
  cancel-in-progress: false

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Tipps berechnen & veröffentlichen
        run: bash scripts/run_daily.sh "${{ github.event.inputs.date }}"

      - name: Änderungen committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Keine Änderungen."
          else
            git commit -m "Tipps $(TZ=Europe/Zurich date +%F) [auto]"
            git push
          fi
